name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      render_api_key:
        description: "Optional: Render API key — triggers backend deploy (masked, never stored)"
        required: false
        type: string
        default: ""
      verify:
        description: "Set to 'true' to just check the live backend health endpoint"
        required: false
        type: string
        default: ""

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forgeiq-api
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: forgeiq
          POSTGRES_PASSWORD: forgeiq
          POSTGRES_DB: forgeiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forgeiq"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
        env:
          TEST_DATABASE_URL: postgres://forgeiq:forgeiq@localhost:5432/forgeiq_test

  deploy-render:
    if: github.event_name == 'workflow_dispatch' && inputs.render_api_key != ''
    runs-on: ubuntu-latest
    steps:
      - name: Mask API key in all logs
        run: echo "::add-mask::${{ inputs.render_api_key }}"
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy backend to Render
        env:
          RENDER_API_KEY: ${{ inputs.render_api_key }}
          DEPLOY_BRANCH: claude/pensive-hopper-ixUSw
        run: node scripts/render-deploy.js

  verify-health:
    if: github.event_name == 'workflow_dispatch' && inputs.verify == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check live backend health endpoint
        run: |
          echo "Probing https://forgeiq-api.onrender.com/health"
          for i in 1 2 3 4 5; do
            BODY=$(curl -s -m 20 https://forgeiq-api.onrender.com/health || true)
            echo "attempt $i: $BODY"
            echo "$BODY" | grep -q '"success":true' && echo "✅ BACKEND IS LIVE AND HEALTHY" && exit 0
            sleep 15
          done
          echo "❌ health check did not return success:true after 5 attempts"
          exit 1
