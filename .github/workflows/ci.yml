name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forgeiq-api
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: forgeiq
          POSTGRES_PASSWORD: forgeiq
          POSTGRES_DB: forgeiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forgeiq"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
        env:
          TEST_DATABASE_URL: postgres://forgeiq:forgeiq@localhost:5432/forgeiq_test
